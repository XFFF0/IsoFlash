name: Build & Release IsoFlash

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null | tail -3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build APK
        run: |
          set -o pipefail
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log

      - name: Push log to ci-logs branch
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          cp /tmp/build.log build-log.txt 2>/dev/null || echo "no log" > build-log.txt
          git checkout --orphan ci-logs 2>/dev/null || git checkout ci-logs
          git reset
          git add build-log.txt
          git commit -m "CI log $(date -u +'%Y-%m-%d %H:%M')" || true
          git push -f https://x-access-token:${GITHUB_TOKEN}@github.com/XFFF0/IsoFlash.git HEAD:ci-logs
          git checkout main

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: IsoFlash-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Create / Update GitHub Release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          TAG=v1.0

          # Delete existing release + tag if present (so we can re-upload)
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" "$APK#IsoFlash-v1.0.apk" \
            --title "IsoFlash v1.0" \
            --notes "## IsoFlash v1.0

تطبيق أندرويد لحرق ملفات ISO على أقراص USB بدون روت.

### المميزات
- ⚡ حرق ISO مباشرة على USB (مثل dd / Etcher)
- 💾 تهيئة FAT32 مع اختيار MBR أو GPT
- 🗑️ مسح كامل للقرص (zero fill)
- 🔒 بدون روت — يستخدم Android USB Host API

### التثبيت
1. حمّل ملف **IsoFlash-v1.0.apk**
2. فعّل «تثبيت من مصادر غير معروفة» في الإعدادات
3. ثبّت الملف مباشرة

### المتطلبات
- Android 8.0 (API 26) أو أحدث
- جهاز يدعم USB OTG (Host Mode)"
